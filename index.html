<!DOCTYPE html>
<html lang="en">
<head>
    <title>Download center - Latest versions</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="msal-browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
            <h1>Download Center</h1>
        </div>
        <div id="user-section" class="user-section">
            <div id="user-info" class="user-info" style="display: none;">
                <div class="user-avatar" id="user-avatar">U</div>
                <span id="username">User</span>
            </div>
            <div class="action-buttons">
                <button id="login-header-button">Login</button>
                <button id="logout-button" style="display: none;">Logout</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="login-view" class="login-container">
            <div class="login-card">
                <h2 class="login-title">Welcome to AEI Download Center</h2>
                <p>Please sign in to access the latest software versions.</p>
                <div id="login-error" class="status-message"></div>
                <button id="login-button" class="login-button">Sign In with Microsoft</button>
                <p class="login-message">Secure access to support resources.</p>
            </div>
        </div>

        <div id="files-view" style="display: none;">
            <h1 class="page-title">Latest Versions</h1>

            <div class="controls-container">
                <a href="programs.html" class="back-button" style="display: inline-block; text-decoration: none;">All versions</a>
            </div>

            <div id="file-operation-status" class="status-message"></div>

            <table class="versions-table versions-table-latest">
                <thead>
                    <tr>
                        <th>Program</th>
                        <th>Version</th>
                        <th>Link</th>
                    </tr>
                </thead>
                <tbody id="latest-versions-tbody"></tbody>
            </table>
        </div>
    </main>

    <button id="help-button" class="help-button" title="Help" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M0 0h24v24H0z" fill="none"></path>
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"></path>
        </svg>
    </button>

    <script>
        const msalConfig = {
            auth: {
                clientId: "b1438db9-79e6-457a-99fd-66e7ae4fe160",
                authority: "https://login.microsoftonline.com/81dbb0d4-0d50-4aa5-a35c-04b98c73f3e0",
                redirectUri: window.location.origin + window.location.pathname,
                postLogoutRedirectUri: window.location.origin + window.location.pathname
            },
            cache: {
                cacheLocation: "sessionStorage"
            }
        };

        const loginRequest = {
            scopes: ["User.Read", "GroupMember.Read.All"]
        };

        const tokenRequest = {
            scopes: ["User.Read", "GroupMember.Read.All"]
        };

        const ALLOWED_GROUP_ID = "622b603c-f4df-41cd-88fb-ea857d6ddf79";
        const msalInstance = new msal.PublicClientApplication(msalConfig);

        let currentAccount = null;

        const loginBtn = document.getElementById("login-button");
        const loginHeaderBtn = document.getElementById("login-header-button");
        const logoutBtn = document.getElementById("logout-button");
        const helpBtn = document.getElementById("help-button");

        loginBtn.onclick = () => {
            msalInstance.loginRedirect(loginRequest).catch(error => console.error("Login redirect error:", error));
        };

        loginHeaderBtn.onclick = () => {
            msalInstance.loginRedirect(loginRequest).catch(error => console.error("Login redirect error:", error));
        };

        logoutBtn.onclick = () => {
            msalInstance.logoutRedirect({ account: currentAccount || null }).catch(error => console.error("Logout redirect error:", error));
        };

        helpBtn.onclick = (e) => {
            e.preventDefault();
            window.open('https://munters-aei.zendesk.com/hc/en-us/requests/new?ticket_form_id=18575973794588', '_blank');
        };

        async function getToken() {
            const account = currentAccount || msalInstance.getActiveAccount();
            try {
                const response = await msalInstance.acquireTokenSilent({ ...tokenRequest, account });
                return response.accessToken;
            } catch (error) {
                if (error instanceof msal.InteractionRequiredAuthError) {
                    await msalInstance.acquireTokenRedirect({ ...tokenRequest, account });
                    throw new Error('Redirecting to acquire token');
                }
                throw error;
            }
        }

        async function checkGroupMembership() {
            try {
                const token = await getToken();
                const response = await fetch("https://graph.microsoft.com/v1.0/me/memberOf", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!response.ok) {
                    throw new Error(`Graph API error: ${response.statusText}`);
                }

                const data = await response.json();
                const groups = data.value.map(item => item.id);

                if (groups.includes(ALLOWED_GROUP_ID)) {
                    updateUI();
                    loadLatestVersions();
                } else {
                    const status = document.getElementById('file-operation-status');
                    status.className = 'status-message error';
                    status.textContent = 'Access Denied: You do not have permission to access this resource.';
                    updateUI();
                }
            } catch (error) {
                console.error("Group membership check error:", error);
                updateUI();
            }
        }

        function updateUI() {
            if (currentAccount) {
                document.getElementById("login-view").style.display = "none";
                document.getElementById("files-view").style.display = "block";
                document.getElementById("user-info").style.display = "flex";
                document.getElementById("login-header-button").style.display = "none";
                document.getElementById("logout-button").style.display = "inline-block";
                document.getElementById("username").textContent = currentAccount.name || currentAccount.username;
                const initials = currentAccount.name
                    ? currentAccount.name.split(' ').map(n => n[0]).join('').substring(0, 2)
                    : currentAccount.username.charAt(0);
                document.getElementById("user-avatar").textContent = initials.toUpperCase();
                document.getElementById("help-button").style.display = "flex";
            } else {
                document.getElementById("login-view").style.display = "flex";
                document.getElementById("files-view").style.display = "none";
                document.getElementById("user-info").style.display = "none";
                document.getElementById("login-header-button").style.display = "inline-block";
                document.getElementById("logout-button").style.display = "none";
                document.getElementById("help-button").style.display = "none";
            }
        }

        function loadLatestVersions() {
            fetch('programs.json')
                .then(response => response.json())
                .then(data => renderLatestVersions(data.programs || []))
                .catch(error => {
                    console.error('Error loading programs.json:', error);
                    const status = document.getElementById('file-operation-status');
                    status.className = 'status-message error';
                    status.textContent = 'Error loading programs data.';
                });
        }

        function renderLatestVersions(programs) {
            const tbody = document.getElementById('latest-versions-tbody');
            tbody.innerHTML = '';

            programs.forEach(program => {
                const latestVersion = program.versions && program.versions.length > 0 ? program.versions[0] : null;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${program.name}</td>
                    <td>${latestVersion ? latestVersion.version : 'N/A'}</td>
                    <td>${latestVersion ? `<a href="${latestVersion.link}" target="_blank" rel="noopener noreferrer">Download</a>` : '-'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        window.onload = async () => {
            try {
                const redirectResponse = await msalInstance.handleRedirectPromise();
                if (redirectResponse && redirectResponse.account) {
                    currentAccount = redirectResponse.account;
                    msalInstance.setActiveAccount(currentAccount);
                    await checkGroupMembership();
                } else {
                    const accounts = msalInstance.getAllAccounts();
                    if (accounts.length > 0) {
                        currentAccount = accounts[0];
                        msalInstance.setActiveAccount(currentAccount);
                        await checkGroupMembership();
                    } else {
                        updateUI();
                    }
                }
            } catch (error) {
                console.error('Error during redirect handling:', error);
                updateUI();
            }
        };
    </script>
</body>
</html>
