<!DOCTYPE html>
<html lang="en">

<head>
    <title>Download Center - Latest Releases</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
            <h1>Download Center</h1>
        </div>
        <div id="user-section" class="user-section">
            <div id="user-info" class="user-info" style="display: none;">
                <div class="user-avatar" id="user-avatar">U</div>
                <span id="username">User</span>
            </div>
            <div class="action-buttons">
                <button id="login-header-button">Login</button>
                <button id="logout-button" style="display: none;">Logout</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="login-view" class="login-container">
            <div class="login-card">
                <h2 class="login-title">Welcome to AEI Download Center</h2>
                <p>Please sign in to access files.</p>
                <button id="login-button" class="login-button">Sign In with Microsoft</button>
            </div>
        </div>

        <div id="files-view" style="display: none;" class="latest-versions-view">
            <div class="page-header-with-button">
                <h1 class="page-title">Latest Software Releases</h1>
                <a href="programs.html" class="see-all-versions-button">Explore All Programs →</a>
            </div>

            <div class="programs-container">
                <div class="latest-versions-table-container">
                    <table class="versions-table">
                        <thead>
                            <tr>
                                <th>Program</th>
                                <th>Latest Version</th>
                                <th>Release Date</th>
                                <th>Action</th>
                                <th>Note</th>
                            </tr>
                        </thead>
                        <tbody id="versions-tbody-latest">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    // ... (mantenha o seu HTML/CSS original) ...

    <script>
        const msalConfig = {
            auth: {
                clientId: "b1438db9-79e6-457a-99fd-66e7ae4fe160",
                authority: "https://login.microsoftonline.com/81dbb0d4-0d50-4aa5-a35c-04b98c73f3e0",
                redirectUri: window.location.origin + window.location.pathname
            },
            cache: { cacheLocation: "sessionStorage" }
        };

        // Use o ID fixo que você descobriu anteriormente para evitar erros de resolução
        const SITE_ID = "munters.sharepoint.com,982f0f48-7eeb-40a6-8fdd-05b784e5a726,45c2fb8f-7d45-c245-abcc-fb8f7d45c245";
        const ROOT_PATH = "R&D/Software Releases";

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        async function getToken() {
            // Garante que o MSAL está inicializado antes de pedir o token
            if (msalInstance.initialize) await msalInstance.initialize();

            let account = msalInstance.getActiveAccount();
            if (!account) {
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    account = accounts[0];
                    msalInstance.setActiveAccount(account);
                }
            }

            if (!account) return null;

            try {
                const response = await msalInstance.acquireTokenSilent({
                    scopes: ["Files.Read.All", "Sites.Read.All"],
                    account: account
                });
                return response.accessToken;
            } catch (error) {
                console.warn("Silent token failed", error);
                // Se falhar silenciosamente, precisamos de interação
                if (error instanceof msal.InteractionRequiredAuthError) {
                    msalInstance.acquireTokenRedirect({
                        scopes: ["Files.Read.All", "Sites.Read.All"]
                    });
                }
                return null;
            }
        }

        async function loadProgramsData() {
            const tbody = document.getElementById('versions-tbody-latest');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Connecting to SharePoint...</td></tr>';

            try {
                const token = await getToken();
                if (!token) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Please <a href="#" onclick="executeLogin()">Login</a> to see releases.</td></tr>';
                    return;
                }

                // Busca os drives do site
                const drivesResp = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drives`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const drivesData = await drivesResp.json();

                if (drivesData.error) throw new Error(drivesData.error.message);

                // Seleciona a biblioteca de documentos padrão
                const drive = drivesData.value.find(d => d.name === "Documents") || drivesData.value[0];
                const driveId = drive.id;

                // Lista os programas
                const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodeURIComponent(ROOT_PATH)}:/children`;
                const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
                const data = await resp.json();

                if (data.error) throw new Error(data.error.message);

                const programs = (data.value || []).filter(i => i.folder);
                tbody.innerHTML = '';

                for (const prog of programs) {
                    // Busca a versão mais recente dentro de cada pasta
                    const vUrl = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodeURIComponent(ROOT_PATH + '/' + prog.name)}:/children?$orderby=name desc&$top=1`;
                    const vResp = await fetch(vUrl, { headers: { Authorization: `Bearer ${token}` } });
                    const vData = await vResp.json();

                    if (vData.value && vData.value.length > 0) {
                        const latest = vData.value[0];
                        let dateStr = "N/A";

                        // Tenta ler o version.txt
                        const txtPath = encodeURIComponent(`${ROOT_PATH}/${prog.name}/${latest.name}/version.txt`);
                        const txtResp = await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${txtPath}:/content`, {
                            headers: { Authorization: `Bearer ${token}` }
                        });

                        if (txtResp.ok) {
                            const txt = await txtResp.text();
                            dateStr = (txt.match(/Timestamp:\s*(.*)/i) || [null, "N/A"])[1].trim();
                        }

                        tbody.innerHTML += `
                        <tr>
                            <td><strong>${prog.name}</strong></td>
                            <td><span class="badge">${latest.name}</span></td>
                            <td>${dateStr}</td>
                            <td><a href="${latest.webUrl}" target="_blank" class="download-link">Open Folder</a></td>
                            <td>-</td>
                        </tr>`;
                    }
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:red; text-align:center;">${e.message}</td></tr>`;
            }
        }

        const executeLogin = async () => {
            if (msalInstance.initialize) await msalInstance.initialize();
            msalInstance.loginRedirect({
                scopes: ["openid", "profile", "User.Read", "Files.Read.All", "Sites.Read.All"]
            });
        };

        document.getElementById("login-button").onclick = executeLogin;

        window.onload = async () => {
            const result = await msalInstance.handleRedirectPromise();
            if (result) msalInstance.setActiveAccount(result.account);

            if (msalInstance.getActiveAccount()) {
                updateUI(); // Função que esconde o login e mostra a tabela
                loadProgramsData();
            }
        };
    </script>
</body>

</html>
