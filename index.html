<!DOCTYPE html>
<html lang="en">
<head>
    <title>Download Center - Latest Releases</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
            <h1>Download Center</h1>
        </div>
        <div id="user-section" class="user-section">
            <div id="user-info" class="user-info" style="display: none;">
                <div class="user-avatar" id="user-avatar">U</div>
                <span id="username">User</span>
            </div>
            <div class="action-buttons">
                <button id="login-header-button">Login</button>
                <button id="logout-button" style="display: none;">Logout</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="login-view" class="login-container">
            <div class="login-card">
                <h2 class="login-title">Welcome to AEI Download Center</h2>
                <p>Please sign in to access files.</p>
                <button id="login-button" class="login-button">Sign In with Microsoft</button>
            </div>
        </div>

        <div id="files-view" style="display: none;" class="latest-versions-view">
            <div class="page-header-with-button">
                <h1 class="page-title">Latest Software Releases</h1>
                <a href="programs.html" class="see-all-versions-button">Explore All Programs →</a>
            </div>
            
            <div class="programs-container">
                <div class="latest-versions-table-container">
                    <table class="versions-table">
                        <thead>
                            <tr>
                                <th>Program</th>
                                <th>Latest Version</th>
                                <th>Release Date</th>
                                <th>Action</th>
                                <th>Note</th>
                            </tr>
                        </thead>
                        <tbody id="versions-tbody-latest">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "b1438db9-79e6-457a-99fd-66e7ae4fe160",
                authority: "https://login.microsoftonline.com/81dbb0d4-0d50-4aa5-a35c-04b98c73f3e0",
                redirectUri: window.location.origin + window.location.pathname
            },
            cache: { cacheLocation: "sessionStorage" }
        };

        const SITE_ID = "munters.sharepoint.com:/sites/aeillc"; 
        const ROOT_PATH = "Shared Documents/R&D/Software Releases";
        const ALLOWED_GROUP_ID = "622b603c-f4df-41cd-88fb-ea857d6ddf79";

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let currentAccount = null;

        // UI Logic
        const updateUI = () => {
            const isLoggedIn = !!msalInstance.getActiveAccount();
            document.getElementById("login-view").style.display = isLoggedIn ? "none" : "flex";
            document.getElementById("files-view").style.display = isLoggedIn ? "block" : "none";
            document.getElementById("logout-button").style.display = isLoggedIn ? "inline-block" : "none";
            document.getElementById("login-header-button").style.display = isLoggedIn ? "none" : "inline-block";
        };

        async function getToken() {
            const request = { scopes: ["Files.Read.All", "Sites.Read.All"] };
            const response = await msalInstance.acquireTokenSilent(request);
            return response.accessToken;
        }

        async function loadProgramsData() {
            const tbody = document.getElementById('versions-tbody-latest');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Scanning SharePoint directories...</td></tr>';

            try {
                const token = await getToken();
                // 1. Get Programs
                const resp = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drive/root:/${ROOT_PATH}:/children`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await resp.json();
                const programs = data.value.filter(i => i.folder);

                tbody.innerHTML = '';

                for (const prog of programs) {
                    // 2. Get Latest Version Folder
                    const vResp = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drive/root:/${ROOT_PATH}/${prog.name}:/children?$orderby=name desc&$top=1`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const vData = await vResp.json();
                    
                    if (vData.value && vData.value.length > 0) {
                        const latest = vData.value[0];
                        let dateStr = "N/A";

                        // 3. Read version.txt
                        const txtResp = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drive/root:/${ROOT_PATH}/${prog.name}/${latest.name}/version.txt:/content`, {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        
                        if (txtResp.ok) {
                            const txt = await txtResp.text();
                            const match = txt.match(/Timestamp:\s*(.*)/i);
                            dateStr = match ? match[1] : "N/A";
                        }

                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${prog.name}</strong></td>
                                <td><span class="badge">${latest.name}</span></td>
                                <td>${dateStr}</td>
                                <td><a href="${latest.webUrl}" target="_blank" class="download-link">Open Folder</a></td>
                                <td><span class="text-muted">Available in folder</span></td>
                            </tr>`;
                    }
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:red;">Error: ${e.message}</td></tr>`;
            }
        }

        document.getElementById("login-button").onclick = () => msalInstance.loginRedirect({ scopes: ["Files.Read.All"] });
        document.getElementById("logout-button").onclick = () => msalInstance.logoutRedirect();

        window.onload = async () => {
            const resp = await msalInstance.handleRedirectPromise();
            if (resp) msalInstance.setActiveAccount(resp.account);
            if (msalInstance.getActiveAccount()) {
                updateUI();
                loadProgramsData();
            }
        };
    </script>
</body>
</html>
