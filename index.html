<!DOCTYPE html>
<html lang="en">

<head>
    <title>Download Center - Latest Releases</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
            <h1>Download Center</h1>
        </div>
        <div id="user-section" class="user-section">
            <div id="user-info" class="user-info" style="display: none;">
                <div class="user-avatar" id="user-avatar">U</div>
                <span id="username">User</span>
            </div>
            <div class="action-buttons">
                <button id="login-header-button">Login</button>
                <button id="logout-button" style="display: none;">Logout</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="login-view" class="login-container">
            <div class="login-card">
                <h2 class="login-title">Welcome to AEI Download Center</h2>
                <p>Please sign in to access files.</p>
                <button id="login-button" class="login-button">Sign In with Microsoft</button>
            </div>
        </div>

        <div id="files-view" style="display: none;" class="latest-versions-view">
            <div class="page-header-with-button">
                <h1 class="page-title">Latest Software Releases</h1>
                <a href="programs.html" class="see-all-versions-button">Explore All Programs →</a>
            </div>

            <div class="programs-container">
                <div class="latest-versions-table-container">
                    <table class="versions-table">
                        <thead>
                            <tr>
                                <th>Program</th>
                                <th>Latest Version</th>
                                <th>Release Date</th>
                                <th>Action</th>
                                <th>Note</th>
                            </tr>
                        </thead>
                        <tbody id="versions-tbody-latest">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "b1438db9-79e6-457a-99fd-66e7ae4fe160",
                authority: "https://login.microsoftonline.com/81dbb0d4-0d50-4aa5-a35c-04b98c73f3e0",
                redirectUri: window.location.origin + window.location.pathname
            },
            cache: { cacheLocation: "sessionStorage" }
        };

        // Removido "Shared Documents/" do início
        const ROOT_PATH = "R&D/Software Releases";
        const SITE_ID = "munters.sharepoint.com:/sites/aeillc";
        const ALLOWED_GROUP_ID = "622b603c-f4df-41cd-88fb-ea857d6ddf79";

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let currentAccount = null;

        // UI Logic
        const updateUI = () => {
            const isLoggedIn = !!msalInstance.getActiveAccount();
            document.getElementById("login-view").style.display = isLoggedIn ? "none" : "flex";
            document.getElementById("files-view").style.display = isLoggedIn ? "block" : "none";
            document.getElementById("logout-button").style.display = isLoggedIn ? "inline-block" : "none";
            document.getElementById("login-header-button").style.display = isLoggedIn ? "none" : "inline-block";
        };

        async function getToken() {
            let account = msalInstance.getActiveAccount();

            if (!account) {
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    account = accounts[0];
                    msalInstance.setActiveAccount(account);
                } else {
                    throw new Error("No active account found. Please login again.");
                }
            }

            try {
                const response = await msalInstance.acquireTokenSilent({
                    scopes: ["Files.Read.All", "Sites.Read.All"],
                    account: account
                });
                return response.accessToken;
            } catch (error) {
                console.warn("Silent token acquisition failed, retrying with redirect...", error);
                if (error instanceof msal.InteractionRequiredAuthError) {
                    await msalInstance.acquireTokenRedirect({
                        scopes: ["Files.Read.All", "Sites.Read.All"]
                    });
                }
                throw error;
            }
        }

        async function loadProgramsData() {
            const tbody = document.getElementById('versions-tbody-latest');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Connecting to SharePoint...</td></tr>';

            try {
                const token = await getToken();
                if (!token) throw new Error("Authentication failed: Access token is empty.");

                // 1. Buscar todas as bibliotecas (drives) do site para evitar erro de SPO License
                const drivesResp = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drives`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const drivesData = await drivesResp.json();

                if (drivesData.error) throw new Error(`API Error: ${drivesData.error.message}`);

                // 2. Encontrar a biblioteca "Documents" (Shared Documents)
                const mainDrive = drivesData.value.find(d => d.name === "Documents") || drivesData.value[0];
                if (!mainDrive) throw new Error("No document library found on this site.");

                const driveId = mainDrive.id;
                const cleanPath = "R&D/Software Releases";

                // 3. Buscar os Programas
                const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodeURIComponent(cleanPath)}:/children`;
                const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
                const data = await resp.json();

                if (data.error) throw new Error(`Path Error: ${data.error.message}`);

                const programs = (data.value || []).filter(i => i.folder);
                tbody.innerHTML = '';

                for (const prog of programs) {
                    try {
                        // 4. Buscar a versão mais recente
                        const vUrl = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodeURIComponent(cleanPath + '/' + prog.name)}:/children?$orderby=name desc&$top=1`;
                        const vResp = await fetch(vUrl, { headers: { Authorization: `Bearer ${token}` } });
                        const vData = await vResp.json();

                        if (vData.value && vData.value.length > 0) {
                            const latest = vData.value[0];
                            let dateStr = "N/A";

                            // 5. Tentar ler version.txt
                            const txtPath = encodeURIComponent(`${cleanPath}/${prog.name}/${latest.name}/version.txt`);
                            const txtResp = await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${txtPath}:/content`, {
                                headers: { Authorization: `Bearer ${token}` }
                            });

                            if (txtResp.ok) {
                                const txt = await txtResp.text();
                                const match = txt.match(/Timestamp:\s*(.*)/i);
                                dateStr = match ? match[1].trim() : "N/A";
                            }

                            tbody.innerHTML += `
                        <tr>
                            <td><strong>${prog.name}</strong></td>
                            <td><span class="badge">${latest.name}</span></td>
                            <td>${dateStr}</td>
                            <td><a href="${latest.webUrl}" target="_blank" class="download-link">Open Folder</a></td>
                            <td><span class="text-muted">Direct Access</span></td>
                        </tr>`;
                        }
                    } catch (err) { console.warn(`Error on ${prog.name}:`, err); }
                }
            } catch (e) {
                console.error("Critical Failure:", e);
                tbody.innerHTML = `<tr><td colspan="5" style="color:red; text-align:center; padding:20px;">
            <strong>Critical Error:</strong> ${e.message}<br>
            <small>Please ensure you are logged in and have permissions.</small>
        </td></tr>`;
            }
        }

        document.getElementById("login-button").onclick = () => msalInstance.loginRedirect({ scopes: ["Files.Read.All"] });
        document.getElementById("logout-button").onclick = () => msalInstance.logoutRedirect();

        window.onload = async () => {
            const resp = await msalInstance.handleRedirectPromise();
            if (resp) msalInstance.setActiveAccount(resp.account);
            if (msalInstance.getActiveAccount()) {
                updateUI();
                loadProgramsData();
            }
        };
    </script>
</body>

</html>
