<!DOCTYPE html>
<html lang="en">
<head>
    <title>Download Center - Latest Releases</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://alcdn.msauth.net/browser/3.10.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo"><img src="logo.png" alt="Logo"><h1>Download Center</h1></div>
        <div id="user-section" class="user-section">
            <div id="user-info" class="user-info" style="display: none;">
                <div class="user-avatar" id="user-avatar">U</div>
                <span id="username">User</span>
            </div>
            <button id="logout-button" style="display: none;">Logout</button>
        </div>
    </header>

    <main class="main-content">
        <div id="login-view" class="login-container">
            <div class="login-card">
                <h2>Welcome to AEI Download Center</h2>
                <p>Please sign in to access software releases.</p>
                <button id="login-button" class="login-button">Sign In with Microsoft</button>
            </div>
        </div>

        <div id="files-view" style="display: none;">
            <div class="page-header-with-button">
                <h1 class="page-title">Latest Software Releases</h1>
                <a href="programs.html" class="see-all-versions-button">Explore All Programs →</a>
            </div>
            <table class="versions-table">
                <thead>
                    <tr>
                        <th>Program</th>
                        <th>Latest Version</th>
                        <th>Release Date</th>
                        <th>Action</th>
                        <th>Note</th>
                    </tr>
                </thead>
                <tbody id="versions-tbody-latest"></tbody>
            </table>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "b1438db9-79e6-457a-99fd-66e7ae4fe160",
                authority: "https://login.microsoftonline.com/81dbb0d4-0d50-4aa5-a35c-04b98c73f3e0",
                redirectUri: window.location.origin + "/" 
            },
            cache: { cacheLocation: "sessionStorage" }
        };

        const SITE_ID = "munters.sharepoint.com,982f0f48-7eeb-40a6-8fdd-05b784e5a726,45c2fb8f-7d45-c245-abcc-fb8f7d45c245";
        const ROOT_PATH = "R&D/Software Releases";
        
        const msalInstance = new msal.PublicClientApplication(msalConfig);

        // Centraliza toda a lógica de Auth aqui para evitar conflitos
        async function initAuth() {
            try {
                await msalInstance.initialize(); //
                
                // 1. Processa o retorno do redirecionamento (lê o #code=...)
                const result = await msalInstance.handleRedirectPromise();
                
                if (result) {
                    msalInstance.setActiveAccount(result.account);
                } else {
                    const accounts = msalInstance.getAllAccounts();
                    if (accounts.length > 0) msalInstance.setActiveAccount(accounts[0]);
                }

                // 2. Decide o que mostrar na tela
                const account = msalInstance.getActiveAccount();
                if (account) {
                    showApp(account);
                    loadProgramsData();
                } else {
                    showLogin();
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        }

        function showApp(account) {
            document.getElementById("login-view").style.display = "none";
            document.getElementById("files-view").style.display = "block";
            document.getElementById("logout-button").style.display = "block";
            document.getElementById("user-info").style.display = "flex";
            document.getElementById("username").textContent = account.name;
        }

        function showLogin() {
            document.getElementById("login-view").style.display = "flex";
            document.getElementById("files-view").style.display = "none";
            document.getElementById("logout-button").style.display = "none";
            document.getElementById("user-info").style.display = "none";
        }

        async function getToken() {
            try {
                const response = await msalInstance.acquireTokenSilent({
                    scopes: ["Files.Read.All", "Sites.Read.All"],
                    account: msalInstance.getActiveAccount()
                });
                return response.accessToken;
            } catch (e) {
                console.warn("Silent token failed, login required.", e);
                return null;
            }
        }

        async function loadProgramsData() {
            const tbody = document.getElementById('versions-tbody-latest');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading...</td></tr>';

            try {
                const token = await getToken();
                if (!token) return;

                // Busca o Drive
                const drivesResp = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drives`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const drivesData = await drivesResp.json();
                const driveId = (drivesData.value.find(d => d.name === "Documents") || drivesData.value[0]).id;

                // Busca Programas
                const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodeURIComponent(ROOT_PATH)}:/children`;
                const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
                const data = await resp.json();

                tbody.innerHTML = '';
                for (const prog of (data.value || []).filter(i => i.folder)) {
                    // Busca última versão
                    const vUrl = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodeURIComponent(ROOT_PATH + '/' + prog.name)}:/children?$orderby=name desc&$top=1`;
                    const vResp = await fetch(vUrl, { headers: { Authorization: `Bearer ${token}` } });
                    const vData = await vResp.json();

                    if (vData.value && vData.value.length > 0) {
                        const latest = vData.value[0];
                        let dateStr = "N/A";

                        // Tenta ler version.txt
                        const txtPath = encodeURIComponent(`${ROOT_PATH}/${prog.name}/${latest.name}/version.txt`);
                        const txtResp = await fetch(`https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${txtPath}:/content`, {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        if (txtResp.ok) {
                            const txt = await txtResp.text();
                            dateStr = (txt.match(/Timestamp:\s*(.*)/i) || [null, "N/A"])[1].trim();
                        }

                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${prog.name}</strong></td>
                                <td><span class="badge">${latest.name}</span></td>
                                <td>${dateStr}</td>
                                <td><a href="${latest.webUrl}" target="_blank" class="download-link">Open Folder</a></td>
                                <td>-</td>
                            </tr>`;
                    }
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:red; text-align:center;">${e.message}</td></tr>`;
            }
        }

        document.getElementById("login-button").onclick = () => {
            msalInstance.loginRedirect({
                scopes: ["openid", "profile", "User.Read", "Files.Read.All", "Sites.Read.All"]
            });
        };

        document.getElementById("logout-button").onclick = () => msalInstance.logoutRedirect();

        // Inicia o processo apenas uma vez
        initAuth();
    </script>
</body>
</html>
