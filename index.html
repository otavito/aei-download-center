<!DOCTYPE html>
<html lang="en">
<head>
    <title>Download Center - Latest Releases</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
            <h1>Download Center</h1>
        </div>
        <div id="user-section" class="user-section">
            <div id="user-info" class="user-info" style="display: none;">
                <div class="user-avatar" id="user-avatar">U</div>
                <span id="username">User</span>
            </div>
            <div class="action-buttons">
                <button id="login-header-button">Login</button>
                <button id="logout-button" style="display: none;">Logout</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="login-view" class="login-container">
            <div class="login-card">
                <h2 class="login-title">Welcome to AEI Download Center</h2>
                <p>Please sign in to access software releases.</p>
                <button id="login-button" class="login-button">Sign In with Microsoft</button>
            </div>
        </div>

        <div id="files-view" style="display: none;">
            <div class="page-header-with-button">
                <h1 class="page-title">Latest Software Releases</h1>
                <a href="programs.html" class="see-all-versions-button">Explore All Programs →</a>
            </div>
            
            <div class="programs-container">
                <table class="versions-table">
                    <thead>
                        <tr>
                            <th>Program</th>
                            <th>Latest Version</th>
                            <th>Release Date</th>
                            <th>Action</th>
                            <th>Note</th>
                        </tr>
                    </thead>
                    <tbody id="versions-tbody-latest">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURAÇÃO MSAL V2
        const msalConfig = {
            auth: {
                clientId: "b1438db9-79e6-457a-99fd-66e7ae4fe160",
                authority: "https://login.microsoftonline.com/81dbb0d4-0d50-4aa5-a35c-04b98c73f3e0",
                redirectUri: window.location.origin + window.location.pathname
            },
            cache: {
                cacheLocation: "sessionStorage"
            }
        };

        const loginRequest = {
            scopes: ["User.Read", "Files.Read.All", "Sites.Read.All"]
        };

        // Identificadores do SharePoint
        const SITE_ID = "munters.sharepoint.com,982f0f48-7eeb-40a6-8fdd-05b784e5a726,45c2fb8f-7d45-c245-abcc-fb8f7d45c245";
        const ROOT_PATH = "R&D/Software Releases";

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        // FUNÇÕES DE UI
        function updateUI() {
            const account = msalInstance.getActiveAccount();
            if (account) {
                document.getElementById("login-view").style.display = "none";
                document.getElementById("files-view").style.display = "block";
                document.getElementById("user-info").style.display = "flex";
                document.getElementById("username").textContent = account.name;
                document.getElementById("logout-button").style.display = "inline-block";
                document.getElementById("login-header-button").style.display = "none";
            } else {
                document.getElementById("login-view").style.display = "flex";
                document.getElementById("files-view").style.display = "none";
                document.getElementById("user-info").style.display = "none";
                document.getElementById("logout-button").style.display = "none";
                document.getElementById("login-header-button").style.display = "inline-block";
            }
        }

        // HANDLERS DE BOTÃO
        document.getElementById("login-button").onclick = () => {
            msalInstance.loginRedirect(loginRequest);
        };
        document.getElementById("login-header-button").onclick = () => {
            msalInstance.loginRedirect(loginRequest);
        };
        document.getElementById("logout-button").onclick = () => {
            msalInstance.logoutRedirect();
        };

        // TOKEN ACQUISITION
        async function getToken() {
            const account = msalInstance.getActiveAccount();
            if (!account) return null;
            try {
                const response = await msalInstance.acquireTokenSilent({
                    ...loginRequest,
                    account: account
                });
                return response.accessToken;
            } catch (error) {
                if (error instanceof msal.InteractionRequiredAuthError) {
                    msalInstance.acquireTokenRedirect(loginRequest);
                }
                return null;
            }
        }

        // CARREGAMENTO DE DADOS (Versão simplificada para não travar o login)
        async function loadProgramsData() {
            const tbody = document.getElementById('versions-tbody-latest');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading data...</td></tr>';

            try {
                const token = await getToken();
                if (!token) return;

                // Busca o Drive Principal
                const drivesResp = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drives`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const drivesData = await drivesResp.json();
                const driveId = drivesData.value[0].id; // Pega a primeira biblioteca disponível

                // Lista os Programas
                const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodeURIComponent(ROOT_PATH)}:/children`;
                const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
                const data = await resp.json();

                tbody.innerHTML = '';
                if (!data.value) throw new Error("Path not found");

                for (const prog of data.value.filter(i => i.folder)) {
                    // Busca última versão
                    const vUrl = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodeURIComponent(ROOT_PATH + '/' + prog.name)}:/children?$orderby=name desc&$top=1`;
                    const vResp = await fetch(vUrl, { headers: { Authorization: `Bearer ${token}` } });
                    const vData = await vResp.json();

                    if (vData.value && vData.value.length > 0) {
                        const latest = vData.value[0];
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${prog.name}</strong></td>
                                <td>${latest.name}</td>
                                <td>Loading date...</td>
                                <td><a href="${latest.webUrl}" target="_blank">Open Folder</a></td>
                                <td>-</td>
                            </tr>`;
                    }
                }
            } catch (e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="5" style="color:red; text-align:center;">Logged in, but could not load files.</td></tr>`;
            }
        }

        // LÓGICA DE INICIALIZAÇÃO (Padrão V2 que funcionava)
        window.onload = () => {
            msalInstance.handleRedirectPromise()
                .then(response => {
                    if (response) {
                        msalInstance.setActiveAccount(response.account);
                    } else {
                        const currentAccounts = msalInstance.getAllAccounts();
                        if (currentAccounts.length > 0) {
                            msalInstance.setActiveAccount(currentAccounts[0]);
                        }
                    }
                    updateUI();
                    if (msalInstance.getActiveAccount()) {
                        loadProgramsData();
                    }
                })
                .catch(error => {
                    console.error("Redirect Error:", error);
                });
        };
    </script>
</body>
</html>
